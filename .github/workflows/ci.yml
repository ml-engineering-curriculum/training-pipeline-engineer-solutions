name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            modules/**/*.md
            projects/**/*.md
            !**/node_modules/**

  python-syntax:
    name: Python syntax (modules/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile every .py under modules/
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=( modules/**/*.py )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No modules/**/*.py — nothing to check."
            exit 0
          fi
          fails=0
          for f in "${files[@]}"; do
            if ! python -m py_compile "$f"; then
              echo "::error file=$f::SyntaxError"
              fails=$((fails+1))
            fi
          done
          echo "Compiled ${#files[@]} file(s); ${fails} failure(s)."
          exit "$fails"
